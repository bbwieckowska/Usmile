# Nazwa workflow, która pojawi się w zakładce Actions
name: R-CMD-check

# Kiedy workflow ma się uruchamiać?
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }} # Uruchomi test na wielu systemach i wersjach R

    # Macierz strategii: definiuje różne konfiguracje do przetestowania
    strategy:
      fail-fast: false # Nie przerywaj całego workflow, jeśli jedna konfiguracja failuje
      matrix:
        config:
          # Testuj na trzech głównych systemach operacyjnych
          - {os: ubuntu-latest, r: 'release'} # Najnowsza stabilna wersja R na Ubuntu
          - {os: macOS-latest, r: 'release'}  # Najnowsza stabilna wersja R na macOS
          - {os: windows-latest, r: 'release'} # Najnowsza stabilna wersja R na Windows

    # Kroki do wykonania dla każdej konfiguracji z macierzy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config curl-openssl

      # --- NOWY KLUCZOWY KROK: Instalacja zależności pakietu ---
      - name: Install package dependencies
        run: |
          # Najpierw instalujemy remotes do instalacji z GitHub jeśli potrzeba
          install.packages("remotes")
          # Pobierz listę zależności z DESCRIPTION i zainstaluj je
          deps <- desc::desc_get_deps()
          # Filtrujemy tylko zależności typu 'Imports' i 'Suggests'
          pkgs <- deps$package[deps$type %in% c("Imports", "Depends")]
          # Instalujemy wszystkie wymagane pakiety
          install.packages(pkgs)
        shell: Rscript {0}
      # --------------------------------------------------------

      - name: Check package
        run: |
          rcmdcheck::rcmdcheck(args = "--as-cran", error_on = "error")
        shell: Rscript {0}
        id: deployment
        uses: actions/deploy-pages@v4
